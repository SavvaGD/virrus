<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать файл</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0d1117;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 14px 40px;
            font-size: 18px;
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>

    <button onclick="document.getElementById('fileInput').click()">Отправить файл</button>
    <input type="file" id="fileInput" style="display: none" onchange="saveToFolder(this.files[0])">

    <script>
        async function saveToFolder(file) {
            try {
                const handle = await window.showDirectoryPicker();
                const folder = handle;
                const newFile = await folder.getFileHandle(file.name, { create: true });
                const writable = await newFile.createWritable();
                await writable.write(file);
                await writable.close();
            } catch (e) {
                // Пользователь закрыл окно выбора папки
            }
        }
    </script>

</body>
</html>
