<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Uploader</title>
</head>
<body>
    <h3>Загрузка из App Inventor</h3>
    <input type="file" id="fileInput">
    <button onclick="upload()">Загрузить вручную</button>

    <script>
        // Эта функция будет вызываться из App Inventor через WebViewString
        function uploadFromAppInventor(base64data, filename) {
            // Переводим Base64 в Blob
            const byteString = atob(base64data);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            const blob = new Blob([ab]);

            // Создаём форму для отправки на сервер (например, file.io или свой сервер)
            const formData = new FormData();
            formData.append("file", blob, filename);
            
            // ОТПРАВЛЯЕМ НА ВНЕШНИЙ ХОСТИНГ (бесплатный)
            fetch("https://file.io/?expires=1d", { // хранится 1 день
                method: "POST",
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                document.body.innerHTML += "<p>✅ Ссылка: <a href='" + data.link + "'>" + data.link + "</a></p>";
                // Отправляем ссылку обратно в App Inventor
                window.AppInventor.setWebViewString("SUCCESS:" + data.link);
            });
        }
    </script>
</body>
</html>
